<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 | ROLLING LOG SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        /* 复用核心变量 */
        :root {
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.04);
            --card-hover: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(255, 255, 255, 0.3);
            --text: #ffffff;
            --text-off: #777777;
            --glow: 0 0 25px rgba(255, 255, 255, 0.2);
            --glow-strong: 0 0 45px rgba(255, 255, 255, 0.45);
            --radius-main: 22px;
            --radius-inner: 12px;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            cursor: default;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 70%);
            overflow: hidden;
        }

        .ultra-bold {
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        /* 登录容器 */
        .login-shell {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: var(--radius-main);
            padding: 40px 30px;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            text-shadow: var(--glow);
        }

        .header p {
            font-size: 10px;
            font-weight: 800;
            opacity: 0.3;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        /* 输入框样式 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            opacity: 0.4;
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-inner);
            padding: 16px;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 14px;
            transition: 0.3s;
            cursor: text;
        }

        input:focus {
            border-color: var(--border-glow);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        /* 按钮样式 */
        .btn-login {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-inner);
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: var(--glow-strong);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* 提示弹窗 */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #ff4444;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 12px;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10000;
            text-transform: uppercase;
        }
        #toast.active { transform: translateX(-50%) translateY(0); }

        /* 动画 */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-shell">
        <div class="glass reveal">
            <div class="header">
                <h1 class="ultra-bold">SYSTEM ACCESS</h1>
                <p>AUTHORIZED PERSONNEL ONLY</p>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter identifier..." autocomplete="off">
            </div>

            <div class="input-group">
                <label>Access Code</label>
                <input type="password" id="password" placeholder="Enter credentials...">
            </div>

            <button class="btn-login" onclick="handleLogin()">Initialize Login</button>
        </div>
    </div>

    <div id="toast">Invalid Credentials</div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const toast = document.getElementById('toast');

            // 验证逻辑
            if (user === 'snmwdd' && pass === 'snmwddLLL') {
                // 成功：按钮反馈并跳转
                const btn = document.querySelector('.btn-login');
                btn.innerText = "ACCESS GRANTED";
                btn.style.background = "#00ff88";
                
                setTimeout(() => {
                    window.location.href = 'https://snwmdd114514-lang.github.io/b.html';
                }, 800);
            } else {
                // 失败：显示弹窗
                toast.classList.add('active');
                
                // 输入框抖动效果 (可选)
                document.querySelector('.glass').style.borderColor = "#ff4444";
                
                setTimeout(() => {
                    toast.classList.remove('active');
                    document.querySelector('.glass').style.borderColor = "rgba(255, 255, 255, 0.08)";
                }, 2000);
            }
        }

        // 监听回车键
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
