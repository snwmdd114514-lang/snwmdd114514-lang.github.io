<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYNAMIC MONITOR | ROLLING LOG</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --glow: 0 0 25px rgba(255, 255, 255, 0.4);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 70%);
        }

        /* 顶部状态栏 */
        .monitor-info {
            position: fixed;
            top: 30px;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.4;
            text-align: center;
        }

        #status-light {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #333;
            border-radius: 50%;
            margin-right: 10px;
        }

        .active-pulse { background: #00ff88 !important; box-shadow: 0 0 12px #00ff88; }

        /* 动态内容显示区域 */
        #output {
            font-size: 80px; /* 减小字号以适应更长的内容 */
            font-weight: 900;
            text-shadow: var(--glow);
            text-align: center;
            max-width: 90%;
            word-break: break-all; /* 自动换行防止溢出 */
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #output.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .debug-clear {
            position: fixed;
            bottom: 30px;
            font-size: 9px;
            opacity: 0.2;
            cursor: pointer;
            text-transform: uppercase;
            border: 1px solid #fff;
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="monitor-info">
        <span id="status-light"></span> ROLLING_LOG_DYNAMIC_MONITOR
        <p id="status-text" style="margin-top:5px; font-size:8px;">IDLE</p>
    </div>

    <div id="output">WAITING...</div>

    <div class="debug-clear" onclick="resetSignal()">Reset Terminal</div>

    <script>
        const DB_URL = "https://rolling-log-965e2-default-rtdb.firebaseio.com/signal.json";
        const outputDiv = document.getElementById('output');
        const light = document.getElementById('status-light');
        const statusText = document.getElementById('status-text');

        // 上一次接收到的内容（用于避免重复刷新动画）
        let lastContent = "";

        async function monitor() {
            setInterval(async () => {
                // 指示灯闪烁
                light.classList.add('active-pulse');
                setTimeout(() => light.classList.remove('active-pulse'), 200);

                try {
                    const response = await fetch(DB_URL);
                    const data = await response.json();

                    // 核心逻辑：只要有信号且不是 IDLE，就显示出来
                    if (data && data.last_signal && data.last_signal !== "IDLE") {
                        const currentSignal = data.last_signal;
                        
                        // 只有当内容变化时才更新，防止动画一直闪烁
                        if (currentSignal !== lastContent) {
                            outputDiv.innerText = currentSignal;
                            outputDiv.classList.add('visible');
                            statusText.innerText = "DATA_RECEIVED: " + currentSignal;
                            lastContent = currentSignal;
                        }
                    } else {
                        outputDiv.classList.remove('visible');
                        statusText.innerText = "STATUS: LISTENING_FOR_SIGNAL";
                        lastContent = "";
                    }
                } catch (err) {
                    statusText.innerText = "ERROR: OFFLINE";
                }
            }, 1000); 
        }

        async function resetSignal() {
            await fetch(DB_URL, {
                method: 'PATCH',
                body: JSON.stringify({ last_signal: "IDLE" })
            });
        }

        monitor();
    </script>
</body>
</html>
