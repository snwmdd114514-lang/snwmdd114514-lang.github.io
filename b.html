<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMOTE CONSOLE | ROLLING LOG</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(255, 255, 255, 0.3);
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 70%);
        }

        /* 顶部接收显示区 */
        .receive-area {
            text-align: center;
            margin-bottom: 50px;
        }

        #output {
            font-size: 60px;
            font-weight: 800;
            text-shadow: var(--glow);
            opacity: 0.3;
            transition: 0.5s;
        }

        #output.active { opacity: 1; transform: scale(1.05); }

        /* 底部发送控制区 */
        .control-panel {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 13px;
            text-align: center;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        input:focus {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
            outline: none;
            box-shadow: var(--glow);
        }

        .btn-send {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 30px;
            font-weight: 800;
            font-size: 11px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 15px #fff; }

        /* 状态指示 */
        .status {
            position: fixed;
            top: 20px;
            font-size: 9px;
            opacity: 0.3;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="status">TERMINAL_LINK_ACTIVE</div>

    <div class="receive-area">
        <p style="font-size: 10px; opacity: 0.3; margin-bottom: 10px;">LATEST_INCOMING_SIGNAL</p>
        <div id="output">IDLE</div>
    </div>

    <div class="control-panel">
        <input type="text" id="cmdInput" placeholder="TYPE COMMAND TO SCRIPT..." autocomplete="off">
        <button class="btn-send" onclick="sendCommand()">Execute Remote</button>
    </div>

    <script>
        const DB_URL = "https://rolling-log-965e2-default-rtdb.firebaseio.com/signal.json";
        
        // --- 1. 监听脚本发来的内容 ---
        let lastIn = "";
        setInterval(async () => {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (data && data.last_signal && data.last_signal !== lastIn) {
                    const out = document.getElementById('output');
                    out.innerText = data.last_signal;
                    out.classList.add('active');
                    lastIn = data.last_signal;
                }
            } catch(e) {}
        }, 1000);

        // --- 2. 发送内容给脚本 ---
        async function sendCommand() {
            const input = document.getElementById('cmdInput');
            const val = input.value;
            if (!val) return;

            const btn = document.querySelector('.btn-send');
            btn.innerText = "SENDING...";

            try {
                await fetch(DB_URL, {
                    method: 'PATCH',
                    body: JSON.stringify({ 
                        command: val,
                        cmd_time: Date.now() // 加入时间戳，让脚本知道是新命令
                    })
                });
                input.value = "";
                btn.innerText = "SUCCESS";
                setTimeout(() => btn.innerText = "Execute Remote", 1000);
            } catch(e) {
                btn.innerText = "FAILED";
            }
        }

        // 绑定回车键
        document.getElementById('cmdInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendCommand();
        });
    </script>
</body>
</html>
