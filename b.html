<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL CHAT | ROLLING LOG</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 70%);
        }

        /* 状态头 */
        .header {
            padding: 20px;
            font-size: 10px;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            opacity: 0.5;
            display: flex;
            justify-content: space-between;
        }

        /* 历史消息区域 */
        #chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        .msg.web {
            align-self: flex-end;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .msg.script {
            align-self: flex-start;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: #aaa;
        }

        .msg-tag {
            display: block;
            font-size: 8px;
            font-weight: 800;
            margin-bottom: 4px;
            opacity: 0.5;
        }

        /* 输入区 */
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 12px;
            color: #fff;
            font-family: var(--font-mono);
            outline: none;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 20px;
            font-weight: 800;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="header">
        <span>ROLLING_LOG_COMM_V5.0</span>
        <span id="sync-status">SYNCING...</span>
    </div>

    <div id="chat-flow">
        <!-- 消息会在这里生成 -->
    </div>

    <div class="input-area">
        <input type="text" id="mInput" placeholder="SEND MESSAGE TO SCRIPT..." autocomplete="off">
        <button onclick="send()">SEND</button>
    </div>

    <script>
        const DB_URL = "https://rolling-log-965e2-default-rtdb.firebaseio.com/messages.json";
        let displayedIds = new Set();

        // 监听并获取历史记录
        async function fetchMessages() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                const flow = document.getElementById('chat-flow');
                let hasNew = false;

                Object.keys(data).forEach(id => {
                    if (!displayedIds.has(id)) {
                        const m = data[id];
                        const div = document.createElement('div');
                        div.className = `msg ${m.sender.toLowerCase()}`;
                        div.innerHTML = `<span class="msg-tag">${m.sender}</span>${m.text}`;
                        flow.appendChild(div);
                        displayedIds.add(id);
                        hasNew = true;
                    }
                });

                if (hasNew) flow.scrollTop = flow.scrollHeight;
                document.getElementById('sync-status').innerText = "SYSTEM_LIVE";
            } catch(e) {
                document.getElementById('sync-status').innerText = "SYNC_ERROR";
            }
        }

        // 发送消息
        async function send() {
            const input = document.getElementById('mInput');
            if (!input.value) return;

            const payload = {
                sender: "WEB",
                text: input.value,
                time: Date.now()
            };

            input.value = "";
            await fetch(DB_URL, {
                method: 'POST', // 使用 POST 实现历史累加
                body: JSON.stringify(payload)
            });
            fetchMessages();
        }

        document.getElementById('mInput').addEventListener('keypress', e => e.key === 'Enter' && send());
        setInterval(fetchMessages, 1500);
        fetchMessages();
    </script>
</body>
</html>
