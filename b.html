<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEIVER | ROLLING LOG</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --glow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 原味显示样式 */
        #output {
            font-size: 150px;
            font-weight: 800;
            text-transform: lowercase; /* 确保显示为小写 a */
            text-shadow: var(--glow);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #output.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* 状态装饰 */
        .status-dot {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="status-dot">SIGNAL_RECEIVER_V5.0</div>

    <!-- 用于显示 a 的容器 -->
    <div id="output"></div>

    <script>
        window.onload = function() {
            // 获取 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            const payload = urlParams.get('payload'); // 寻找 ?payload=...

            const display = document.getElementById('output');

            // 如果接收到的参数是 "A"
            if (payload === 'A') {
                display.innerText = 'a';
                
                // 延迟一秒显示动画效果，增加科技感
                setTimeout(() => {
                    display.classList.add('visible');
                }, 100);
            } else {
                // 如果没有 A，显示一个静默状态
                console.log("Waiting for signal 'A'...");
            }
        };
    </script>
</body>
</html>
