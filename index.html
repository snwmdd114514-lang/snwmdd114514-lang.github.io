
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滚木脚本 | ROLLING LOG - PREMIUM HUB</title>
    <!-- 引入极粗字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.6);
            --radius-lg: 24px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            /* 背景微光效果 */
            background-image: radial-gradient(circle at 50% -20%, #222 0%, #050505 80%);
        }

        /* 导航栏：高斯模糊 */
        nav {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
            /* Logo 泛光 */
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 30px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0.6;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
            text-shadow: 0 0 10px #fff;
        }

        /* Hero 区域 */
        .hero {
            padding: 180px 20px 80px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(50px, 10vw, 120px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            /* 文字泛光 */
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
        }

        .hero p {
            font-size: 18px;
            font-weight: 600;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-bottom: 50px;
        }

        /* 脚本容器：圆角 + 模糊 + 泛光 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .script-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: 0.5s;
        }

        .script-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .tag {
            background: #fff;
            color: #000;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .code-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: var(--radius-sm);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
            word-break: break-all;
            line-height: 1.5;
        }

        /* 复制按钮：纯白泛光 */
        .copy-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: var(--radius-sm);
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 0px rgba(255,255,255,0);
        }

        .copy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        /* 游戏列表：圆角网格 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 50px;
            margin-bottom: 100px;
        }

        .game-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: var(--radius-lg);
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .game-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }

        .game-item h3 {
            font-weight: 900;
            font-size: 20px;
            text-transform: uppercase;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 60px;
            opacity: 0.3;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            nav { padding: 0 5%; }
            .hero h1 { font-size: 50px; }
            .script-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ROLLING LOG</div>
        <div class="nav-links">
            <a href="#">DISCORD</a>
            <a href="#">GITHUB</a>
        </div>
    </nav>

    <section class="hero">
        <h1>滚木脚本</h1>
        <p>ROLLING LOG STUDIO / V2.0 PREMIUM</p>
        
        <div class="container">
            <div class="script-card">
                <div class="code-header">
                    <span class="tag">Main Script</span>
                    <span style="font-size: 11px; opacity: 0.5;">UPDATED: 2024.10.24</span>
                </div>
                <div class="code-box" id="scriptCode">
                    loadstring(game:HttpGet("https://raw.githubusercontent.com/RollingLog/Main/main.lua"))()
                </div>
                <button class="copy-btn" onclick="copyScript()">Copy Loadstring</button>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="game-grid">
            <div class="game-item">
                <h3>Blox Fruits</h3>
            </div>
            <div class="game-item">
                <h3>Pet Simulator 99</h3>
            </div>
            <div class="game-item">
                <h3>Doors Hub</h3>
            </div>
        </div>
    </div>

    <footer>
        © 2024 ROLLING LOG STUDIO. ALL RIGHTS RESERVED.
    </footer>

    <script>
        function copyScript() {
            const code = document.getElementById('scriptCode').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerText = 'COPIED TO CLIPBOARD';
                btn.style.background = '#00ff88'; // 成功时短暂变色
                btn.style.boxShadow = '0 0 30px rgba(0, 255, 136, 0.6)';
                
                setTimeout(() => {
                    btn.innerText = 'Copy Loadstring';
                    btn.style.background = '#ffffff';
                    btn.style.boxShadow = '0 0 30px var(--accent-glow)';
                }, 2000);
            });
        }
    </script>
</body>
</html>
