<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --text: #fff; --accent: #ff4444; --success: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 420px; position: relative; }
        .ultra-bold { font-weight: 900; text-transform: uppercase; text-align: center; letter-spacing: -1px; margin-top: 0; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: #fff; color: #000; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; }
        
        /* 统计数据 */
        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 10px; font-weight: 900; color: #777; }
        .stats-item b { color: var(--success); }

        /* 玩家列表 */
        .player-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .kick-btn { background: var(--accent); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 900; }
        .reason-input { width: 80px; margin-bottom: 0; padding: 5px; font-size: 11px; }
        .pulse-text { font-size: 9px; opacity: 0.5; display: block; font-family: 'JetBrains Mono'; }

        /* 侧边面板 */
        .history-trigger { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--border); color: #777; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: 900; cursor: pointer; }
        #history-panel { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: rgba(10,10,10,0.98); border-left: 1px solid var(--border); padding: 20px; transition: 0.4s; z-index: 100; overflow-y: auto; }
        #history-panel.active { right: 0; }
        .history-item { font-size: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'JetBrains Mono'; }
        .h-tag { padding: 2px 4px; border-radius: 3px; font-size: 8px; font-weight: 900; margin-right: 5px; }
        .tag-join { background: var(--success); color: #000; }
        .tag-kick { background: var(--accent); color: #fff; }
        
        /* 永久用户列表样式 */
        .user-list-title { font-size: 12px; font-weight: 900; margin-top: 30px; color: #555; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .user-name-item { font-size: 11px; color: #888; padding: 4px 0; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>
    <div id="login-section" class="glass">
        <h1 class="ultra-bold">Login</h1>
        <input type="text" id="username" placeholder="User">
        <input type="password" id="password" placeholder="Pass">
        <button class="btn" onclick="login()">Access</button>
    </div>

    <div id="admin-section" class="glass" style="display:none">
        <button class="history-trigger" onclick="toggleHistory()">LOGS</button>
        <h1 class="ultra-bold">Monitor</h1>
        
        <div class="stats-bar">
            <div class="stats-item">ONLINE: <b id="stat-online">0</b></div>
            <div class="stats-item">TOTAL USERS: <b id="stat-total">0</b></div>
        </div>

        <div id="player-list"></div>
    </div>

    <div id="history-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:14px; margin:0; font-weight:900;">SYSTEM LOG</h2>
            <button onclick="toggleHistory()" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button>
        </div>
        
        <div id="history-list"></div>

        <div class="user-list-title">PERMANENT USER DIRECTORY</div>
        <div id="all-users-list"></div>
    </div>

    <script>
        const conf = { databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        
        let activePlayers = {};
        let allUsers = {};
        let sessionTracked = new Set(); // 仅限本次打开后台时防止JOIN重复

        function login(){
            if(document.getElementById('username').value==='snmwdd' && document.getElementById('password').value==='snmwddLLL'){
                document.getElementById('login-section').style.display='none';
                document.getElementById('admin-section').style.display='block';
                startSync();
            }
        }

        function startSync() {
            // 1. 监听在线玩家
            db.ref('players').on('value', s => {
                activePlayers = s.val() || {};
                document.getElementById('stat-online').innerText = Object.keys(activePlayers).length;
                handleJoinAndStats();
                renderPlayers();
            });

            // 2. 监听永久用户
            db.ref('users').on('value', s => {
                allUsers = s.val() || {};
                document.getElementById('stat-total').innerText = Object.keys(allUsers).length;
                renderAllUsers();
            });

            // 3. 监听历史
            db.ref('history').limitToLast(30).on('value', s => { renderHistory(s.val()); });

            // 心跳检查
            setInterval(() => {
                const now = Math.floor(Date.now()/1000);
                for(let id in activePlayers) {
                    if(activePlayers[id].lastHeartbeat && (now - activePlayers[id].lastHeartbeat > 10)) db.ref('players/'+id).remove();
                }
            }, 2000);
        }

        function handleJoinAndStats() {
            for(let id in activePlayers) {
                const name = activePlayers[id].name;
                
                // 如果是新用户，加入永久名单
                if(!allUsers[name]) {
                    db.ref('users/' + name).set({
                        firstSeen: Date.now(),
                        name: name
                    });
                }

                // 如果本 session 还没记录过他加入，则记入 history
                if(!sessionTracked.has(id)) {
                    db.ref('history').push({
                        name: name, type: "JOIN", timestamp: Date.now()
                    });
                    sessionTracked.add(id);
                }
            }
            
            // 清理 sessionTracked 中已经离线的 ID，允许他们重连时再次记录
            sessionTracked.forEach(id => {
                if(!activePlayers[id]) sessionTracked.delete(id);
            });
        }

        function renderPlayers() {
            const container = document.getElementById('player-list');
            Array.from(container.children).forEach(c => { if(!activePlayers[c.id.replace('card-','')]) c.remove(); });
            for(let id in activePlayers){
                let card = document.getElementById('card-'+id);
                if(!card){
                    card = document.createElement('div');
                    card.id = 'card-'+id; card.className = 'player-card';
                    card.innerHTML = `<div><span style="font-weight:800">${activePlayers[id].name}</span><span class="pulse-text" id="pulse-${id}">Pulse: --</span></div><div><input class="reason-input" id="r-${id}" placeholder="Reason"><button class="kick-btn" onclick="kick('${id}')">KICK</button></div>`;
                    container.appendChild(card);
                }
                document.getElementById(`pulse-${id}`).innerText = `Pulse: ${activePlayers[id].lastHeartbeat}`;
            }
        }

        function renderHistory(data) {
            const list = document.getElementById('history-list');
            list.innerHTML = ''; if(!data) return;
            Object.values(data).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const tag = item.type === "JOIN" ? "tag-join" : "tag-kick";
                div.innerHTML = `<span class="h-tag ${tag}">${item.type}</span> <span style="color:#eee">${item.name}</span> <span style="color:#444; font-size:8px;">${new Date(item.timestamp).toLocaleTimeString()}</span>`;
                list.appendChild(div);
            });
        }

        function renderAllUsers() {
            const list = document.getElementById('all-users-list');
            list.innerHTML = '';
            Object.keys(allUsers).forEach(name => {
                const div = document.createElement('div');
                div.className = 'user-name-item';
                div.innerText = `> ${name}`;
                list.appendChild(div);
            });
        }

        function kick(id){
            const name = activePlayers[id].name;
            const r = document.getElementById('r-'+id).value || "Violation";
            db.ref('players/'+id).update({ action: 'kick', reason: r });
            db.ref('history').push({ name: name, type: "KICK", detail: r, timestamp: Date.now() });
        }

        function toggleHistory() { document.getElementById('history-panel').classList.toggle('active'); }
    </script>
</body>
</html>
