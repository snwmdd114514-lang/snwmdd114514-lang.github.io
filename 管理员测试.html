<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - SYSTEM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --side: #080808; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.06); --blue: #00d9ff; --accent: #ff4444; --success: #00ff88; }
        * { box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* 登录框 */
        #login-section { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 340px; text-align: center; }
        .login-input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 12px; font-family: 'JetBrains Mono'; }
        .login-btn { width: 100%; padding: 12px; border: none; background: #fff; font-weight: 900; border-radius: 10px; cursor: pointer; color: #000; }

        /* 侧边栏 */
        .sidebar { width: 250px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        #side-server-list { flex: 1; overflow-y: auto; margin: 10px 0; }
        #side-server-list::-webkit-scrollbar { width: 4px; }
        #side-server-list::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: #555; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .nav-item:hover { background: var(--card); color: #fff; }
        .nav-item.active { background: var(--blue); color: #000; }
        .nav-item b { font-size: 10px; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 10px; }
        .side-title { font-weight: 900; font-size: 10px; color: #333; letter-spacing: 2px; margin: 20px 0 10px 5px; text-transform: uppercase; }

        /* 主区域 */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .view { display: none; }
        .view.active { display: block; }

        /* 统计卡 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 18px; }
        .stat-card h3 { font-size: 10px; color: #444; margin: 0; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 900; }

        /* 日志按钮样式 (主页) */
        .log-trigger-btn { background: #fff; color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 12px; margin-bottom: 30px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .log-trigger-btn:hover { background: var(--blue); }

        /* 玩家行 */
        .player-row { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .reason-input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 8px; width: 140px; margin-right: 10px; }
        .btn-kick { background: var(--accent); color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* 日志窗口 (浮动) */
        #log-window { position: fixed; bottom: 30px; right: 30px; width: 400px; height: 500px; background: #050505; border: 1px solid var(--border); border-radius: 20px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .log-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 900; font-size: 13px; }
        .log-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 11px; font-family: 'JetBrains Mono'; color: #555; }
        .log-footer { padding: 15px; background: rgba(255,255,255,0.01); border-top: 1px solid var(--border); font-size: 10px; color: #222; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h2 style="font-weight:900; letter-spacing:-1px;">HUB ACCESS</h2>
            <input type="text" id="user" class="login-input" placeholder="USER ID">
            <input type="password" id="pass" class="login-input" placeholder="PASSCODE">
            <button onclick="login()" class="login-btn">AUTHENTICATE</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight:900; font-size:22px; margin-bottom:30px; letter-spacing:-1.5px;">SYSTEM<span style="color:var(--blue)">HUB</span></div>
        <div class="nav-item active" id="nav-dash" onclick="switchView('dashboard')">🏠 DASHBOARD</div>
        <div class="side-title">Live Server List</div>
        <div id="side-server-list"></div>
    </div>

    <main class="main-content">
        <!-- 仪表盘 -->
        <div id="view-dashboard" class="view active">
            <h1 style="font-weight:900; font-size:38px; margin:0 0 10px 0; letter-spacing:-1.5px;">Overview</h1>
            
            <!-- 将日志按钮移至此处，保证永远可见 -->
            <button class="log-trigger-btn" onclick="toggleLogs()">📋 VIEW SYSTEM AUDIT LOGS</button>

            <div class="stats-grid">
                <div class="stat-card"><h3>GLOBAL ONLINE</h3><p id="stat-online" style="color:var(--success)">0</p></div>
                <div class="stat-card"><h3>DATABASE USERS</h3><p id="stat-users">0</p></div>
                <div class="stat-card"><h3>REG. SERVERS</h3><p id="stat-servers" style="color:var(--blue)">0</p></div>
            </div>
            
            <div class="side-title">Persistent Server Nodes</div>
            <div id="dashboard-server-grid" style="display:grid; grid-gap:15px; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));"></div>
        </div>

        <!-- 服务器详情 -->
        <div id="view-server-detail" class="view">
            <button onclick="switchView('dashboard')" style="background:none; border:none; color:var(--blue); cursor:pointer; font-weight:900; margin-bottom:15px;">← BACK TO HUB</button>
            <h1 id="detail-server-name" style="font-weight:900; font-size:38px; margin:0 0 25px 0; color:var(--blue)">Server</h1>
            <div id="detail-player-list"></div>
        </div>
    </main>

    <!-- 全局日志窗口 -->
    <div id="log-window">
        <div class="log-header">
            <span>SYSTEM AUDIT LOGS</span>
            <span onclick="toggleLogs()" style="cursor:pointer; opacity:0.5;">✕</span>
        </div>
        <div class="log-body" id="log-body"></div>
        <div class="log-footer">
            <b>KNOWN USER DIRECTORY:</b> <span id="user-directory"></span>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let cachedServers = {};
        let currentS = "";
        let inputCache = {}; // 保护输入框内容

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'snmwdd' && p === 'snmwddLLL') {
                document.getElementById('login-section').style.display = 'none';
                startHub();
            } else { alert("ACCESS DENIED"); }
        }

        function startHub() {
            // 实时同步服务器，不会删除任何服务器节点
            db.ref('servers').on('value', s => {
                cachedServers = s.val() || {};
                renderSidebar();
                renderDashboard();
                if(currentS) renderDetail(currentS);
            });

            // 统计总用户
            db.ref('users').on('value', s => {
                const users = s.val() || {};
                document.getElementById('stat-users').innerText = Object.keys(users).length;
                document.getElementById('user-directory').innerText = Object.keys(users).join(', ');
            });

            // 获取历史日志
            db.ref('history').limitToLast(30).on('value', s => {
                const b = document.getElementById('log-body'); b.innerHTML = '';
                Object.values(s.val()||{}).reverse().forEach(v => {
                    b.innerHTML += `<div style="margin-bottom:8px;">[${new Date(v.ts).toLocaleTimeString()}] <b>${v.name}</b> ${v.type} <span style="color:#222;font-size:9px;">@${v.server}</span></div>`;
                });
            });

            // 心跳清理玩家记录
            setInterval(() => {
                const now = Math.floor(Date.now()/1000);
                for(let s in cachedServers) {
                    const players = cachedServers[s].players || {};
                    for(let p in players) {
                        if(now - players[p].lastHeartbeat > 15) {
                            db.ref(`servers/${s}/players/${p}`).remove();
                        }
                    }
                }
            }, 5000);
        }

        function handleInput(pName, val) { inputCache[pName] = val; }

        function switchView(v, s = "") {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            currentS = s;
            if(s) renderDetail(s);
        }

        function renderSidebar() {
            const c = document.getElementById('side-server-list'); c.innerHTML = '';
            let sCount = 0;
            for(let s in cachedServers) {
                sCount++;
                const pCount = Object.keys(cachedServers[s].players || {}).length;
                const d = document.createElement('div');
                d.className = `nav-item ${currentS === s ? 'active' : ''}`;
                d.innerHTML = `<span># ${s}</span><b>${pCount}</b>`;
                d.onclick = () => switchView('server-detail', s);
                c.appendChild(d);
            }
            document.getElementById('stat-servers').innerText = sCount;
        }

        function renderDashboard() {
            const g = document.getElementById('dashboard-server-grid'); g.innerHTML = '';
            let totalOnline = 0;
            for(let s in cachedServers) {
                const pCount = Object.keys(cachedServers[s].players || {}).length;
                totalOnline += pCount;
                const d = document.createElement('div');
                d.style = "background:var(--card); border:1px solid var(--border); padding:20px; border-radius:15px; cursor:pointer;";
                d.innerHTML = `<div style="font-weight:900;">${s}</div><div style="font-size:10px;margin-top:5px;color:${pCount>0?'var(--success)':'#333'}">${pCount>0?'● ACTIVE':'○ EMPTY'} (${pCount})</div>`;
                d.onclick = () => switchView('server-detail', s);
                g.appendChild(d);
            }
            document.getElementById('stat-online').innerText = totalOnline;
        }

        function renderDetail(s) {
            document.getElementById('detail-server-name').innerText = s;
            const c = document.getElementById('detail-player-list'); c.innerHTML = '';
            const players = (cachedServers[s] || {}).players || {};
            
            if(Object.keys(players).length === 0) {
                c.innerHTML = '<div style="color:#222; font-style:italic;">No active connections.</div>';
                return;
            }

            for(let p in players) {
                const row = document.createElement('div');
                row.className = 'player-row';
                const savedValue = inputCache[p] || "";
                row.innerHTML = `
                    <div><b>${p}</b><div style="font-size:10px;color:#222">SYNC: ${players[p].lastHeartbeat}</div></div>
                    <div>
                        <input id="r-${p}" class="reason-input" placeholder="REASON..." value="${savedValue}" oninput="handleInput('${p}', this.value)">
                        <button class="btn-kick" onclick="kick('${s}','${p}')">KICK</button>
                    </div>`;
                c.appendChild(row);
                db.ref('users/'+p).update({name:p, seen:Date.now()});
            }
        }

        function kick(s, p) {
            const r = document.getElementById('r-'+p).value || "Policy Violation";
            db.ref(`servers/${s}/players/${p}`).update({ action: 'kick', reason: r });
            db.ref('history').push({name:p, server:s, type:"KICK", ts:Date.now()});
            inputCache[p] = ""; 
        }

        function toggleLogs() {
            const w = document.getElementById('log-window');
            w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
