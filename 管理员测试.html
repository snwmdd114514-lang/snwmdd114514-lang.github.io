<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MULTI-SERVER MONITOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --text: #fff; --accent: #ff4444; --success: #00ff88; --blue: #00bcff; }
        * { touch-action: pan-y; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 70%); padding-top: 50px; }
        
        .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 95%; max-width: 500px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .ultra-bold { font-weight: 900; text-transform: uppercase; text-align: center; letter-spacing: -1px; margin-bottom: 20px; }
        
        /* 服务器区块样式 */
        .server-section { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .server-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        .server-name { color: var(--blue); font-weight: 900; font-size: 14px; text-transform: uppercase; }
        
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 15px; font-family: 'JetBrains Mono'; }
        .btn { background: #fff; color: #000; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        .player-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .kick-btn { background: var(--accent); color: #fff; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 900; }
        .reason-input { width: 80px; margin-bottom: 0; padding: 5px; font-size: 10px; background: #000; }

        .history-trigger { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 5px; font-size: 11px; font-weight: 900; cursor: pointer; z-index: 100; }

        #history-window { 
            position: fixed; top: 70px; right: 20px; width: 320px; max-width: 90vw; max-height: 70vh; 
            background: rgba(10,10,10,0.95); border: 1px solid var(--border); border-radius: 15px; 
            display: none; flex-direction: column; z-index: 1000; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .win-header { padding: 15px; background: rgba(255,255,255,0.03); cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .win-content { padding: 15px; overflow-y: auto; flex: 1; }
        .history-item { font-size: 11px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: 'JetBrains Mono'; }
        .tag-server { color: var(--blue); font-size: 9px; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="login-section" class="glass">
        <h1 class="ultra-bold">Access Terminal</h1>
        <input type="text" id="username" placeholder="USER ID">
        <input type="password" id="password" placeholder="PASSCODE">
        <button class="btn" onclick="login()">LOGIN</button>
    </div>

    <div id="admin-section" class="glass" style="display:none">
        <button class="history-trigger" onclick="toggleWindow()">GLOBAL LOGS</button>
        <h1 class="ultra-bold">Network Monitor</h1>
        
        <!-- 服务器列表容器 -->
        <div id="server-container">
            <div style="text-align:center; opacity:0.5; font-size:12px;">Waiting for server data...</div>
        </div>
    </div>

    <div id="history-window">
        <div class="win-header" id="drag-handle">
            <span style="font-size:11px; font-weight:900;">SYSTEM LOGS</span>
            <button onclick="toggleWindow()" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button>
        </div>
        <div class="win-content" id="history-list"></div>
    </div>

    <script>
        const conf = { databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function login(){
            if(document.getElementById('username').value==='snmwdd' && document.getElementById('password').value==='snmwddLLL'){
                document.getElementById('login-section').style.display='none';
                document.getElementById('admin-section').style.display='block';
                startMonitoring();
                makeDraggable(document.getElementById("history-window"), document.getElementById("drag-handle"));
            }
        }

        function startMonitoring() {
            // 监听整个 servers 节点
            db.ref('servers').on('value', snapshot => {
                const servers = snapshot.val() || {};
                renderServers(servers);
            });

            // 监听全局历史记录
            db.ref('history').limitToLast(30).on('value', s => {
                const list = document.getElementById('history-list');
                list.innerHTML = ''; 
                if(!s.val()) return;
                Object.values(s.val()).reverse().forEach(item => {
                    list.innerHTML += `
                        <div class="history-item">
                            <span style="color:#555">[${new Date(item.ts).toLocaleTimeString()}]</span>
                            <span class="tag-server">${item.server || 'UNK'}</span>
                            <b>${item.name}</b> 
                            <span style="color:${item.type==='JOIN'?'#00ff88':'#ff4444'}">${item.type}</span>
                        </div>`;
                });
            });

            // 心跳检查：清理掉线的玩家
            setInterval(() => {
                const now = Math.floor(Date.now()/1000);
                db.ref('servers').once('value', s => {
                    const data = s.val();
                    for(let sName in data){
                        for(let pName in data[sName].players){
                            const p = data[sName].players[pName];
                            if(p.lastHeartbeat && (now - p.lastHeartbeat > 15)){
                                db.ref(`servers/${sName}/players/${pName}`).remove();
                            }
                        }
                    }
                });
            }, 5000);
        }

        function renderServers(servers) {
            const container = document.getElementById('server-container');
            container.innerHTML = '';

            for (let sName in servers) {
                const players = servers[sName].players || {};
                const pCount = Object.keys(players).length;
                if(pCount === 0) continue; // 如果没玩家就不显示该服务器

                const section = document.createElement('div');
                section.className = 'server-section';
                
                let playerHtml = '';
                for (let pName in players) {
                    playerHtml += `
                        <div class="player-card">
                            <div>
                                <span style="font-weight:800;font-size:13px;">${pName}</span>
                                <span style="font-size:9px;opacity:0.4;display:block;">Online</span>
                            </div>
                            <div>
                                <input class="reason-input" id="r-${sName}-${pName}" placeholder="Reason">
                                <button class="kick-btn" onclick="kick('${sName}', '${pName}')">KICK</button>
                            </div>
                        </div>`;
                }

                section.innerHTML = `
                    <div class="server-header">
                        <span class="server-name"># ${sName}</span>
                        <span style="font-size:10px; font-weight:900;">ONLINE: ${pCount}</span>
                    </div>
                    ${playerHtml}
                `;
                container.appendChild(section);
            }
        }

        function kick(sName, pName) {
            const reason = document.getElementById(`r-${sName}-${pName}`).value || "Policy Violation";
            // 发送踢出指令到特定服务器下的玩家
            db.ref(`servers/${sName}/players/${pName}`).update({
                action: 'kick',
                reason: reason
            });
            // 记录到全局历史
            db.ref('history').push({
                name: pName,
                server: sName,
                type: "KICK",
                detail: reason,
                ts: Date.now()
            });
        }

        function toggleWindow() {
            const w = document.getElementById('history-window');
            w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
        }

        function makeDraggable(el, handle) {
            let x = 0, y = 0, mx = 0, my = 0;
            const start = (e) => {
                const t = e.type === 'touchstart' ? e.touches[0] : e;
                mx = t.clientX; my = t.clientY;
                document.onmousemove = document.ontouchmove = move;
                document.onmouseup = document.ontouchend = stop;
            };
            const move = (e) => {
                const t = e.type === 'touchmove' ? e.touches[0] : e;
                x = mx - t.clientX; y = my - t.clientY;
                mx = t.clientX; my = t.clientY;
                el.style.top = (el.offsetTop - y) + "px";
                el.style.left = (el.offsetLeft - x) + "px";
            };
            const stop = () => { document.onmousemove = document.ontouchmove = null; };
            handle.onmousedown = handle.ontouchstart = start;
        }
    </script>
</body>
</html>
