<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台控制 | ROLLING LOG SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --accent: #ff4444;
            --success: #00ff88;
            --radius-main: 22px;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 70%);
        }

        .container { width: 100%; max-width: 450px; padding: 20px; }
        .glass {
            background: var(--card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: var(--radius-main);
            padding: 40px 30px;
        }

        .ultra-bold { font-weight: 900; letter-spacing: -1px; text-transform: uppercase; text-align: center; margin: 0; }
        
        #login-section { display: block; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 900; opacity: 0.4; margin-bottom: 8px; text-transform: uppercase; }
        input {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; color: #fff; font-family: var(--font-mono); box-sizing: border-box;
        }
        .btn {
            background: #fff; color: #000; border: none; width: 100%; padding: 16px;
            border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        /* 后台列表 */
        #admin-section { display: none; }
        .player-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px; padding: 15px; margin-top: 15px;
            border: 1px solid var(--border);
        }
        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .player-name { font-family: var(--font-mono); font-size: 14px; color: var(--success); }
        .kick-controls { display: flex; gap: 10px; }
        .reason-input { padding: 8px; font-size: 12px; flex-grow: 1; }
        .kick-btn {
            background: var(--accent); color: white; border: none; padding: 0 15px;
            border-radius: 8px; font-weight: 800; cursor: pointer;
        }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); padding: 10px 25px; border-radius: 50px;
            font-size: 12px; font-weight: 900; display: none; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 登录界面 -->
        <div id="login-section" class="glass">
            <h1 class="ultra-bold">SYSTEM ACCESS</h1>
            <p style="text-align:center; opacity:0.3; font-size:10px; margin-bottom:30px; letter-spacing: 2px;">SECURE TERMINAL</p>
            <div class="input-group">
                <label>Identifier</label>
                <input type="text" id="username" placeholder="Username" value="snmwdd">
            </div>
            <div class="input-group">
                <label>Access Code</label>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn" onclick="handleLogin()">INITIALIZE</button>
        </div>

        <!-- 管理员控制台 -->
        <div id="admin-section" class="glass">
            <h1 class="ultra-bold">TERMINAL</h1>
            <p style="text-align:center; color:var(--success); font-size:10px; margin-bottom:20px;">ONLINE SESSION MONITOR</p>
            <div id="player-list">
                <p style="text-align:center; opacity:0.3; font-size:12px;">Searching for active logs...</p>
            </div>
        </div>
    </div>

    <div id="toast">ACCESS DENIED</div>

    <script>
        // 配置你的 Firebase
        const firebaseConfig = {
            databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (u === 'snmwdd' && p === 'snmwddLLL') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
                startLiveUpdate();
            } else {
                showToast("INVALID CREDENTIALS");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        function startLiveUpdate() {
            // 实时获取玩家列表
            db.ref('players').on('value', (snapshot) => {
                const list = document.getElementById('player-list');
                const players = snapshot.val();
                list.innerHTML = '';

                if (!players) {
                    list.innerHTML = '<p style="text-align:center; opacity:0.3; font-size:12px;">No players connected.</p>';
                    return;
                }

                Object.keys(players).forEach(id => {
                    const p = players[id];
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.innerHTML = `
                        <div class="player-header">
                            <span class="player-name">USER: ${p.name}</span>
                            <span style="font-size:9px; opacity:0.4;">ID: ${p.userId}</span>
                        </div>
                        <div class="kick-controls">
                            <input type="text" class="reason-input" id="res-${id}" placeholder="Reason for kick...">
                            <button class="kick-btn" onclick="sendKick('${id}')">KICK</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        function sendKick(name) {
            const reason = document.getElementById('res-' + name).value || "Administrative action";
            db.ref('players/' + name).update({
                action: 'kick',
                reason: reason
            }).then(() => {
                showToast("KICK COMMAND SENT");
            });
        }
    </script>
</body>
</html>
