<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - SYSTEM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050505; --side: #0a0a0a; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --accent: #ff4444; --blue: #00d9ff; --success: #00ff88; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* 登录界面 */
        #login-section { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 350px; text-align: center; }

        /* 侧边栏 */
        .sidebar { width: 240px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .side-title { font-weight: 900; font-size: 12px; color: #444; letter-spacing: 2px; margin-bottom: 20px; margin-top: 20px; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; font-size: 14px; font-weight: 700; color: #888; display: flex; justify-content: space-between; align-items: center; }
        .nav-item:hover { background: var(--card); color: #fff; }
        .nav-item.active { background: var(--blue); color: #000; }
        .nav-item b { font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; }

        /* 主内容区 */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .view { display: none; }
        .view.active { display: block; }

        /* 统计卡片 (主页使用) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }
        .stat-card h3 { margin: 0; font-size: 12px; color: #666; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: 900; }

        /* 服务器概览卡片 */
        .server-grid { display: grid; grid-gap: 15px; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        .s-info-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; cursor: pointer; }
        .s-info-card:hover { border-color: var(--blue); }

        /* 玩家列表 (服务器详情页使用) */
        .player-list-container { max-width: 800px; }
        .player-row { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 按钮与输入框 */
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 8px; font-family: 'JetBrains Mono'; outline: none; }
        .btn-kick { background: var(--accent); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 12px; }
        
        /* 日志悬浮窗口 */
        #log-window { position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; background: rgba(10,10,10,0.95); border: 1px solid var(--border); border-radius: 15px; display: flex; flex-direction: column; z-index: 1000; display: none;}
        .log-header { padding: 10px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 900; display: flex; justify-content: space-between; }
        .log-body { flex: 1; overflow-y: auto; padding: 10px; font-size: 10px; font-family: 'JetBrains Mono'; }
        .log-item { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h1 style="font-weight:900; font-size:20px; margin-bottom:20px;">HUB ACCESS</h1>
            <input type="text" id="user" placeholder="USER ID" style="width:100%; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="PASSCODE" style="width:100%; margin-bottom:20px;">
            <button onclick="login()" style="width:100%; padding:12px; border-radius:10px; border:none; background:#fff; font-weight:900; cursor:pointer;">UNLOCK</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight:900; font-size:18px; margin-bottom:30px;">SYSTEM <span style="color:var(--blue)">HUB</span></div>
        
        <div class="nav-item active" onclick="switchView('dashboard')">🏠 DASHBOARD</div>
        
        <div class="side-title">ACTIVE SERVERS</div>
        <div id="side-server-list">
            <!-- 动态生成服务器列表 -->
        </div>

        <div class="side-title" style="margin-top:auto">UTILS</div>
        <div class="nav-item" onclick="toggleLogs()">📋 SYSTEM LOGS</div>
    </div>

    <main class="main-content">
        <!-- 主面板视图 -->
        <div id="view-dashboard" class="view active">
            <h1 style="font-weight:900; font-size:32px; margin-top:0;">Network Overview</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>TOTAL ONLINE</h3><p id="stat-online">0</p></div>
                <div class="stat-card"><h3>TOTAL USERS</h3><p id="stat-users">0</p></div>
                <div class="stat-card"><h3>ACTIVE SERVERS</h3><p id="stat-servers">0</p></div>
            </div>
            <h2 style="font-size:14px; font-weight:900; color:#444; text-transform:uppercase;">Live Server List</h2>
            <div id="dashboard-server-grid" class="server-grid"></div>
        </div>

        <!-- 服务器详情视图 (动态内容) -->
        <div id="view-server-detail" class="view">
            <h1 id="detail-server-name" style="font-weight:900; font-size:32px; margin-top:0; color:var(--blue)">Server Name</h1>
            <div class="player-list-container" id="detail-player-list"></div>
        </div>
    </main>

    <!-- 日志窗口 -->
    <div id="log-window">
        <div class="log-header"><span>SYSTEM LOGS</span><button onclick="toggleLogs()" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button></div>
        <div class="log-body" id="log-body"></div>
        <div style="padding:10px; font-size:9px; color:#444; border-top:1px solid #111;">REGISTERED USERS: <div id="all-users-dir"></div></div>
    </div>

    <script>
        const conf = { databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        let currentServer = ""; 
        let cachedData = {};

        function login() {
            if(document.getElementById('user').value==='snmwdd' && document.getElementById('pass').value==='snmwddLLL'){
                document.getElementById('login-section').style.display = 'none';
                init();
            }
        }

        function init() {
            // 监听服务器主数据
            db.ref('servers').on('value', s => {
                cachedData = s.val() || {};
                renderSidebar();
                renderDashboard();
                if(currentServer) renderServerDetail(currentServer);
            });

            // 监听总用户历史
            db.ref('users').on('value', s => {
                const users = s.val() || {};
                document.getElementById('stat-users').innerText = Object.keys(users).length;
                document.getElementById('all-users-dir').innerText = Object.keys(users).join(', ');
            });

            // 监听日志
            db.ref('history').limitToLast(50).on('value', s => {
                const logBody = document.getElementById('log-body');
                logBody.innerHTML = '';
                const history = s.val() || {};
                Object.values(history).reverse().forEach(h => {
                    logBody.innerHTML += `<div class="log-item"><span style="color:#555">[${new Date(h.ts).toLocaleTimeString()}]</span> <span style="color:var(--blue)">${h.server || 'HUB'}</span> <b>${h.name}</b>: ${h.type} ${h.detail || ''}</div>`;
                });
            });

            // 心跳清理
            setInterval(() => {
                const now = Math.floor(Date.now()/1000);
                for(let sName in cachedData){
                    for(let pName in cachedData[sName].players){
                        if(now - cachedData[sName].players[pName].lastHeartbeat > 15){
                            db.ref(`servers/${sName}/players/${pName}`).remove();
                        }
                    }
                    // 如果服务器下面没有玩家了，直接把服务器节点删了
                    if(!cachedData[sName].players || Object.keys(cachedData[sName].players).length === 0){
                        db.ref(`servers/${sName}`).remove();
                    }
                }
            }, 5000);
        }

        function switchView(viewName, serverName = "") {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));

            if(viewName === 'dashboard') {
                document.getElementById('view-dashboard').classList.add('active');
                currentServer = "";
            } else {
                document.getElementById('view-server-detail').classList.add('active');
                currentServer = serverName;
                renderServerDetail(serverName);
            }
        }

        function renderSidebar() {
            const container = document.getElementById('side-server-list');
            container.innerHTML = '';
            let count = 0;
            for(let sName in cachedData) {
                const pCount = Object.keys(cachedData[sName].players || {}).length;
                if(pCount === 0) continue;
                count++;
                const div = document.createElement('div');
                div.className = `nav-item ${currentServer === sName ? 'active' : ''}`;
                div.innerHTML = `<span># ${sName}</span><b>${pCount}</b>`;
                div.onclick = () => switchView('server', sName);
                container.appendChild(div);
            }
            document.getElementById('stat-servers').innerText = count;
        }

        function renderDashboard() {
            const grid = document.getElementById('dashboard-server-grid');
            grid.innerHTML = '';
            let total = 0;
            for(let sName in cachedData) {
                const pCount = Object.keys(cachedData[sName].players || {}).length;
                if(pCount === 0) continue;
                total += pCount;
                const card = document.createElement('div');
                card.className = 's-info-card';
                card.innerHTML = `<div style="font-weight:900;">${sName}</div><div style="font-size:12px;color:var(--success);margin-top:5px;">● ${pCount} Players Online</div>`;
                card.onclick = () => switchView('server', sName);
                grid.appendChild(card);
            }
            document.getElementById('stat-online').innerText = total;
        }

        function renderServerDetail(sName) {
            document.getElementById('detail-server-name').innerText = sName;
            const container = document.getElementById('detail-player-list');
            container.innerHTML = '';
            
            const players = cachedData[sName] ? cachedData[sName].players : {};
            if(!players || Object.keys(players).length === 0) {
                container.innerHTML = "<p style='color:#444'>No players online in this server.</p>";
                return;
            }

            for(let pName in players) {
                const p = players[pName];
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `
                    <div>
                        <div style="font-weight:900;">${pName}</div>
                        <div style="font-size:10px; color:#555;">ID: ${p.lastHeartbeat}</div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <input id="r-${pName}" placeholder="Reason" style="width:120px; font-size:11px;">
                        <button class="btn-kick" onclick="kick('${sName}', '${pName}')">KICK</button>
                    </div>
                `;
                container.appendChild(row);
                
                // 自动写入全量用户库
                db.ref('users/'+pName).set({name:pName, lastSeen:Date.now()});
            }
        }

        function kick(sName, pName) {
            const reason = document.getElementById('r-'+pName).value || "Admin Discretion";
            db.ref(`servers/${sName}/players/${pName}`).update({action:'kick', reason:reason});
            db.ref('history').push({name:pName, server:sName, type:"KICK", detail:reason, ts:Date.now()});
        }

        function toggleLogs() {
            const logWin = document.getElementById('log-window');
            logWin.style.display = logWin.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
