<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - SYSTEM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050505; --side: #0a0a0a; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --accent: #ff4444; --blue: #00d9ff; --success: #00ff88; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* 登录框 */
        #login-section { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 340px; text-align: center; }
        .login-input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 12px; outline: none; font-family: 'JetBrains Mono'; }
        .login-btn { width: 100%; padding: 12px; border: none; background: #fff; font-weight: 900; border-radius: 10px; cursor: pointer; }

        /* 侧边栏 */
        .sidebar { width: 250px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: #666; display: flex; justify-content: space-between; align-items: center; }
        .nav-item:hover { background: var(--card); color: #fff; }
        .nav-item.active { background: var(--blue); color: #000; }
        .nav-item b { font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; }
        .side-title { font-weight: 900; font-size: 10px; color: #333; letter-spacing: 2px; margin: 20px 0 10px 5px; text-transform: uppercase; }

        /* 主区域 */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .view { display: none; }
        .view.active { display: block; }

        /* 统计卡 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }
        .stat-card h3 { font-size: 10px; color: #444; margin: 0; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 900; }

        /* 服务器展示 */
        .server-grid { display: grid; grid-gap: 15px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .s-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; cursor: pointer; }
        .s-card:hover { border-color: var(--blue); }

        /* 玩家行 */
        .player-row { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-kick { background: var(--accent); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .reason-input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 8px; width: 120px; font-size: 12px; }

        /* 日志窗口 */
        #log-window { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; z-index: 1000; display: none; flex-direction: column; }
        .log-body { flex: 1; overflow-y: auto; padding: 15px; font-size: 11px; font-family: 'JetBrains Mono'; color: #555; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h2 style="font-weight:900; letter-spacing:-1px;">SYSTEM LOGIN</h2>
            <input type="text" id="user" class="login-input" placeholder="USER ID">
            <input type="password" id="pass" class="login-input" placeholder="PASSCODE">
            <button onclick="login()" class="login-btn">ACCESS HUB</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight:900; font-size:20px; margin-bottom:30px;">NETWORK<span style="color:var(--blue)">HUB</span></div>
        <div class="nav-item active" id="nav-dash" onclick="switchView('dashboard')">🏠 DASHBOARD</div>
        <div class="side-title">Live Servers</div>
        <div id="side-server-list"></div>
        <div class="side-title" style="margin-top:auto">Records</div>
        <div class="nav-item" onclick="toggleLogs()">📋 LOGS / USERS</div>
    </div>

    <main class="main-content">
        <!-- 仪表盘 -->
        <div id="view-dashboard" class="view active">
            <h1 style="font-weight:900; font-size:36px; margin:0 0 30px 0;">Overview</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>GLOBAL ONLINE</h3><p id="stat-online" style="color:var(--success)">0</p></div>
                <div class="stat-card"><h3>TOTAL USERS</h3><p id="stat-users">0</p></div>
                <div class="stat-card"><h3>SERVERS</h3><p id="stat-servers" style="color:var(--blue)">0</p></div>
            </div>
            <div class="side-title">Persistent Server Nodes</div>
            <div id="dashboard-server-grid" class="server-grid"></div>
        </div>

        <!-- 服务器详情 -->
        <div id="view-server-detail" class="view">
            <button onclick="switchView('dashboard')" style="background:none; border:none; color:var(--blue); cursor:pointer; font-weight:900; margin-bottom:10px;">← BACK</button>
            <h1 id="detail-server-name" style="font-weight:900; font-size:36px; margin:0 0 20px 0; color:var(--blue)">Server</h1>
            <div id="detail-player-list"></div>
        </div>
    </main>

    <div id="log-window">
        <div style="padding:15px; display:flex; justify-content:space-between; font-weight:900; font-size:12px;">
            <span>SYSTEM LOGS & USER DIRECTORY</span>
            <span onclick="toggleLogs()" style="cursor:pointer;">✕</span>
        </div>
        <div class="log-body" id="log-body"></div>
        <div style="padding:10px; background:rgba(255,255,255,0.02); font-size:9px; color:#333;">
            <b>PERMANENT USERS:</b> <span id="user-directory"></span>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let cachedServers = {};
        let currentS = "";

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'snmwdd' && p === 'snmwddLLL') {
                document.getElementById('login-section').style.display = 'none';
                start();
            } else { alert("Login Failed"); }
        }

        function start() {
            // 关键：监听 servers 节点，不进行删除服务器操作
            db.ref('servers').on('value', s => {
                cachedServers = s.val() || {};
                renderSidebar();
                renderDashboard();
                if(currentS) renderDetail(currentS);
            });

            db.ref('users').on('value', s => {
                const users = s.val() || {};
                document.getElementById('stat-users').innerText = Object.keys(users).length;
                document.getElementById('user-directory').innerText = Object.keys(users).join(', ');
            });

            db.ref('history').limitToLast(20).on('value', s => {
                const b = document.getElementById('log-body'); b.innerHTML = '';
                Object.values(s.val()||{}).reverse().forEach(v => {
                    b.innerHTML += `<div style="margin-bottom:5px;">[${new Date(v.ts).toLocaleTimeString()}] <b>${v.name}</b>: ${v.type} <span style="color:#222">@${v.server}</span></div>`;
                });
            });

            // 网页心跳清理（只清掉线玩家，永不删服务器）
            setInterval(() => {
                const now = Math.floor(Date.now()/1000);
                for(let sName in cachedServers) {
                    const players = cachedServers[sName].players || {};
                    for(let pName in players) {
                        if(now - players[pName].lastHeartbeat > 15) {
                            db.ref(`servers/${sName}/players/${pName}`).remove();
                        }
                    }
                }
            }, 5000);
        }

        function switchView(v, s = "") {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            currentS = s;
            if(s) renderDetail(s);
        }

        function renderSidebar() {
            const c = document.getElementById('side-server-list'); c.innerHTML = '';
            let sCount = 0;
            for(let s in cachedServers) {
                sCount++;
                const pCount = Object.keys(cachedServers[s].players || {}).length;
                const d = document.createElement('div');
                d.className = `nav-item ${currentS === s ? 'active' : ''}`;
                d.innerHTML = `<span># ${s}</span><b>${pCount}</b>`;
                d.onclick = () => switchView('server-detail', s);
                c.appendChild(d);
            }
            document.getElementById('stat-servers').innerText = sCount;
        }

        function renderDashboard() {
            const g = document.getElementById('dashboard-server-grid'); g.innerHTML = '';
            let totalOnline = 0;
            for(let s in cachedServers) {
                const pCount = Object.keys(cachedServers[s].players || {}).length;
                totalOnline += pCount;
                const d = document.createElement('div');
                d.className = 's-card';
                d.innerHTML = `<div style="font-weight:900;font-size:14px;">${s}</div><div style="color:${pCount>0?'var(--success)':'#333'};font-size:11px;margin-top:5px;">● ${pCount} Online</div>`;
                d.onclick = () => switchView('server-detail', s);
                g.appendChild(d);
            }
            document.getElementById('stat-online').innerText = totalOnline;
        }

        function renderDetail(s) {
            document.getElementById('detail-server-name').innerText = s;
            const c = document.getElementById('detail-player-list'); c.innerHTML = '';
            const players = (cachedServers[s] || {}).players || {};
            
            const keys = Object.keys(players);
            if(keys.length === 0) {
                c.innerHTML = '<div style="color:#333; font-style:italic;">No players currently in this server.</div>';
                return;
            }

            for(let p in players) {
                const row = document.createElement('div');
                row.className = 'player-row';
                row.innerHTML = `
                    <div><b>${p}</b><div style="font-size:10px;color:#333">HB: ${players[p].lastHeartbeat}</div></div>
                    <div>
                        <input id="r-${p}" class="reason-input" placeholder="Reason">
                        <button class="btn-kick" onclick="kick('${s}','${p}')">KICK</button>
                    </div>`;
                c.appendChild(row);
                // 确保用户加入永久库
                db.ref('users/'+p).update({name:p, lastActive:Date.now()});
            }
        }

        function kick(s, p) {
            const r = document.getElementById('r-'+p).value || "Violation of Policy";
            // 正确更新 action 字段
            db.ref(`servers/${s}/players/${p}`).update({
                action: 'kick',
                reason: r
            }).then(() => {
                alert("Kick command sent to " + p);
            });
            db.ref('history').push({name:p, server:s, type:"KICK", ts:Date.now()});
        }

        function toggleLogs() {
            const w = document.getElementById('log-window');
            w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
