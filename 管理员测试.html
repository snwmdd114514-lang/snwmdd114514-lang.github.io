<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ACCESS | ROLLING LOG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --text: #fff; --accent: #ff4444; --success: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 70%); }
        
        /* 登录容器 */
        .glass { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 420px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .ultra-bold { font-weight: 900; text-transform: uppercase; text-align: center; letter-spacing: -1px; margin-bottom: 25px; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 15px; box-sizing: border-box; font-family: 'JetBrains Mono'; }
        .btn { background: #fff; color: #000; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--success); transform: scale(1.02); }

        /* 统计栏 */
        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 10px; font-weight: 900; color: #666; }
        .stats-item b { color: var(--success); }

        /* 玩家卡片 */
        .player-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .kick-btn { background: var(--accent); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 900; }
        .reason-input { width: 100px; margin-bottom: 0; padding: 6px; font-size: 11px; background: rgba(0,0,0,0.4); }

        /* 右上角按钮 */
        .history-trigger { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--border); color: #777; padding: 5px 12px; border-radius: 5px; font-size: 10px; font-weight: 900; cursor: pointer; }

        /* 可拖动日志窗口 */
        #history-window { 
            position: fixed; top: 100px; right: 50px; width: 350px; max-height: 500px; 
            background: rgba(10,10,10,0.95); border: 1px solid var(--border); border-radius: 15px; 
            display: none; flex-direction: column; z-index: 1000; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .win-header { 
            padding: 15px; background: rgba(255,255,255,0.03); cursor: move; 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .win-content { padding: 15px; overflow-y: auto; flex: 1; }
        
        /* 日志条目样式 */
        .history-item { font-size: 11px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: 'JetBrains Mono'; line-height: 1.4; }
        .h-time { color: #555; font-size: 9px; display: block; margin-bottom: 4px; }
        .h-tag { padding: 2px 5px; border-radius: 3px; font-size: 8px; font-weight: 900; margin-right: 5px; text-transform: uppercase; }
        .tag-join { background: var(--success); color: #000; }
        .tag-kick { background: var(--accent); color: #fff; }
        .h-reason { color: #ffaa00; display: block; margin-top: 3px; font-size: 10px; border-left: 2px solid #ffaa00; padding-left: 5px; }

        /* 永久名单列表 */
        .user-list { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .user-item { font-size: 10px; color: #888; padding: 3px 0; }
    </style>
</head>
<body>

    <!-- 登录部分 -->
    <div id="login-section" class="glass">
        <h1 class="ultra-bold">Terminal Login</h1>
        <input type="text" id="username" placeholder="IDENTIFIER">
        <input type="password" id="password" placeholder="ACCESS CODE">
        <button class="btn" onclick="login()">INITIALIZE</button>
    </div>

    <!-- 监控面板 -->
    <div id="admin-section" class="glass" style="display:none">
        <button class="history-trigger" onclick="toggleWindow()">WINDOW: LOGS</button>
        <h1 class="ultra-bold">Monitor</h1>
        
        <div class="stats-bar">
            <div class="stats-item">ACTIVE: <b id="stat-online">0</b></div>
            <div class="stats-item">DATABASE USERS: <b id="stat-total">0</b></div>
        </div>

        <div id="player-list"></div>
    </div>

    <!-- 可拖动窗口 -->
    <div id="history-window">
        <div class="win-header" id="drag-handle">
            <span style="font-size:12px; font-weight:900; letter-spacing:1px;">ACTIVITY COMMANDS</span>
            <button onclick="toggleWindow()" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button>
        </div>
        <div class="win-content">
            <div id="history-list"></div>
            <div class="user-list">
                <div style="font-size:10px; font-weight:900; color:#444; margin-bottom:10px;">PERMANENT DIRECTORY</div>
                <div id="all-users-list"></div>
            </div>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        
        let activePlayers = {};
        let allUsers = {};
        let sessionTracked = new Set();

        // 详细时间格式化 (YYYY-MM-DD HH:MM:SS)
        function formatTime(ts) {
            const d = new Date(ts);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function login(){
            if(document.getElementById('username').value==='snmwdd' && document.getElementById('password').value==='snmwddLLL'){
                document.getElementById('login-section').style.display='none';
                document.getElementById('admin-section').style.display='block';
                startSync();
                makeDraggable(document.getElementById("history-window"), document.getElementById("drag-handle"));
            }
        }

        function startSync() {
            db.ref('players').on('value', s => {
                activePlayers = s.val() || {};
                document.getElementById('stat-online').innerText = Object.keys(activePlayers).length;
                handleJoinLogic();
                renderPlayers();
            });

            db.ref('users').on('value', s => {
                allUsers = s.val() || {};
                document.getElementById('stat-total').innerText = Object.keys(allUsers).length;
                renderUsers();
            });

            db.ref('history').limitToLast(40).on('value', s => { renderHistory(s.val()); });

            setInterval(() => {
                const now = Math.floor(Date.now()/1000);
                for(let id in activePlayers) if(activePlayers[id].lastHeartbeat && (now - activePlayers[id].lastHeartbeat > 10)) db.ref('players/'+id).remove();
            }, 2000);
        }

        function handleJoinLogic() {
            for(let id in activePlayers) {
                const name = activePlayers[id].name;
                if(!allUsers[name]) db.ref('users/' + name).set({ firstSeen: Date.now(), name: name });
                if(!sessionTracked.has(id)) {
                    db.ref('history').push({ name: name, type: "JOIN", timestamp: Date.now() });
                    sessionTracked.add(id);
                }
            }
            sessionTracked.forEach(id => { if(!activePlayers[id]) sessionTracked.delete(id); });
        }

        function renderPlayers() {
            const container = document.getElementById('player-list');
            Array.from(container.children).forEach(c => { if(!activePlayers[c.id.replace('card-','')]) c.remove(); });
            for(let id in activePlayers){
                let card = document.getElementById('card-'+id);
                if(!card){
                    card = document.createElement('div');
                    card.id = 'card-'+id; card.className = 'player-card';
                    card.innerHTML = `<div><span style="font-weight:800">${activePlayers[id].name}</span><span style="font-size:9px;opacity:0.4;display:block;" id="pulse-${id}">Pulse...</span></div><div><input class="reason-input" id="r-${id}" placeholder="Kick Reason"><button class="kick-btn" onclick="kick('${id}')">KICK</button></div>`;
                    container.appendChild(card);
                }
                document.getElementById(`pulse-${id}`).innerText = `Last Pulse: ${activePlayers[id].lastHeartbeat}`;
            }
        }

        function renderHistory(data) {
            const list = document.getElementById('history-list');
            list.innerHTML = ''; if(!data) return;
            Object.values(data).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const tag = item.type === "JOIN" ? "tag-join" : "tag-kick";
                div.innerHTML = `
                    <span class="h-time">${formatTime(item.timestamp)}</span>
                    <span class="h-tag ${tag}">${item.type}</span>
                    <span style="color:#fff; font-weight:800">${item.name}</span>
                    ${item.detail ? `<span class="h-reason">Reason: ${item.detail}</span>` : ''}
                `;
                list.appendChild(div);
            });
        }

        function renderUsers() {
            const list = document.getElementById('all-users-list');
            list.innerHTML = '';
            Object.keys(allUsers).forEach(name => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerText = `> ${name}`;
                list.appendChild(div);
            });
        }

        function kick(id){
            const name = activePlayers[id].name;
            const r = document.getElementById('r-'+id).value || "Policy Violation";
            db.ref('players/'+id).update({ action: 'kick', reason: r });
            db.ref('history').push({ name: name, type: "KICK", detail: r, timestamp: Date.now() });
        }

        function toggleWindow() {
            const win = document.getElementById('history-window');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        // 窗口拖动实现
        function makeDraggable(element, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = (e) => {
                e.preventDefault();
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (e) => {
                    e.preventDefault();
                    pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                    pos3 = e.clientX; pos4 = e.clientY;
                    element.style.top = (element.offsetTop - pos2) + "px";
                    element.style.left = (element.offsetLeft - pos1) + "px";
                };
            };
        }
    </script>
</body>
</html>
