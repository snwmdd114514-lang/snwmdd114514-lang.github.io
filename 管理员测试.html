<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - SYSTEM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050505; --side: #0a0a0a; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --accent: #ff4444; --blue: #00d9ff; --success: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* 侧边栏 */
        .sidebar { width: 250px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; font-size: 14px; font-weight: 700; color: #888; display: flex; justify-content: space-between; align-items: center; }
        .nav-item:hover { background: var(--card); color: #fff; }
        .nav-item.active { background: var(--blue); color: #000; }
        .nav-item b { font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; }
        .side-title { font-weight: 900; font-size: 10px; color: #444; letter-spacing: 2px; margin: 20px 0 10px 5px; text-transform: uppercase; }

        /* 主区域 */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 900; }

        /* 服务器概览卡片 */
        .server-grid { display: grid; grid-gap: 15px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        .s-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .s-card:hover { border-color: var(--blue); background: rgba(0,217,255,0.05); }

        /* 玩家行 */
        .player-row { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-kick { background: var(--accent); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 8px; outline: none; }

        /* 日志窗口 */
        #log-window { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 15px; z-index: 1000; display: none; flex-direction: column; box-shadow: 0 20px 50px #000; }
        .log-body { flex: 1; overflow-y: auto; padding: 15px; font-size: 11px; font-family: 'JetBrains Mono'; color: #aaa; }

        /* 登录 */
        #login-section { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-section">
        <div style="text-align:center; background:#111; padding:40px; border-radius:20px; border:1px solid var(--border); width:320px;">
            <h2 style="font-weight:900;margin-bottom:20px;">SYSTEM HUB</h2>
            <input type="password" id="pass" placeholder="PASSCODE" style="width:100%; margin-bottom:20px; padding:12px;">
            <button onclick="login()" style="width:100%; padding:12px; border:none; background:#fff; font-weight:900; border-radius:10px; cursor:pointer;">ACCESS</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight:900; font-size:20px; margin-bottom:30px; letter-spacing:-1px;">CONTROL<span style="color:var(--blue)">HUB</span></div>
        
        <div class="nav-item active" id="nav-dash" onclick="switchView('dashboard')">🏠 DASHBOARD</div>
        
        <div class="side-title">Live Servers</div>
        <div id="side-server-list"></div>

        <div class="side-title" style="margin-top:auto">System</div>
        <div class="nav-item" onclick="toggleLogs()">📋 ACCESS LOGS</div>
    </div>

    <main class="main-content">
        <!-- 仪表盘视图 -->
        <div id="view-dashboard" class="view active">
            <h1 style="font-weight:900; font-size:36px; margin:0 0 30px 0;">Network Overview</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3 style="margin:0;font-size:12px;color:#444">GLOBAL ONLINE</h3><p id="stat-online" style="color:var(--success)">0</p></div>
                <div class="stat-card"><h3 style="margin:0;font-size:12px;color:#444">ACTIVE SERVERS</h3><p id="stat-servers" style="color:var(--blue)">0</p></div>
                <div class="stat-card"><h3 style="margin:0;font-size:12px;color:#444">DATABASE USERS</h3><p id="stat-users">0</p></div>
            </div>
            <div class="side-title">Live Preview</div>
            <div id="dashboard-server-grid" class="server-grid"></div>
        </div>

        <!-- 服务器详情视图 -->
        <div id="view-server-detail" class="view">
            <button onclick="switchView('dashboard')" style="background:none; border:none; color:var(--blue); cursor:pointer; font-weight:900; margin-bottom:10px; padding:0;">← BACK TO DASHBOARD</button>
            <h1 id="detail-server-name" style="font-weight:900; font-size:36px; margin:0 0 30px 0; color:var(--blue)">Server Name</h1>
            <div id="detail-player-list"></div>
        </div>
    </main>

    <div id="log-window">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; font-weight:900; font-size:12px;">
            <span>SYSTEM LOGS</span>
            <span onclick="toggleLogs()" style="cursor:pointer;">✕</span>
        </div>
        <div class="log-body" id="log-body
