<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #000; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); --text: #fff; --accent: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 400px; }
        .ultra-bold { font-weight: 900; text-transform: uppercase; text-align: center; letter-spacing: -1px; }
        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: #fff; color: #000; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .player-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .kick-btn { background: var(--accent); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 900; }
        .reason-input { width: 80px; margin-bottom: 0; padding: 5px; font-size: 11px; }
        .pulse-text { font-size: 9px; opacity: 0.5; display: block; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>
    <div id="login-section" class="glass">
        <h1 class="ultra-bold">Login</h1>
        <input type="text" id="username" placeholder="User">
        <input type="password" id="password" placeholder="Pass">
        <button class="btn" onclick="login()">Access</button>
    </div>
    <div id="admin-section" class="glass" style="display:none">
        <h1 class="ultra-bold">Monitor</h1>
        <div id="player-list"></div>
    </div>
    <script>
        const conf = { databaseURL: "https://rolling-log-965e2-default-rtdb.firebaseio.com" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let players = {};

        function login(){
            if(document.getElementById('username').value==='snmwdd' && document.getElementById('password').value==='snmwddLLL'){
                document.getElementById('login-section').style.display='none';
                document.getElementById('admin-section').style.display='block';
                
                db.ref('players').on('value', s => { 
                    players = s.val() || {}; 
                    render(); 
                });

                setInterval(() => {
                    const now = Math.floor(Date.now()/1000);
                    for(let id in players) {
                        if(players[id].lastHeartbeat && (now - players[id].lastHeartbeat > 10)) {
                            db.ref('players/'+id).remove();
                        }
                    }
                }, 2000);
            }
        }

        function render(){
            const container = document.getElementById('player-list');
            
            // 1. 删除已经离线的玩家 DOM
            Array.from(container.children).forEach(child => {
                const id = child.id.replace('card-', '');
                if (!players[id]) child.remove();
            });

            // 2. 增加或更新玩家 DOM
            for(let id in players){
                const p = players[id];
                let card = document.getElementById('card-' + id);
                
                if (!card) {
                    // 只在玩家新加入时创建 DOM 结构
                    card = document.createElement('div');
                    card.id = 'card-' + id;
                    card.className = 'player-card';
                    card.innerHTML = `
                        <div>
                            <span style="font-weight:800">${p.name}</span>
                            <span class="pulse-text" id="pulse-${id}">Pulse: --</span>
                        </div>
                        <div>
                            <input class="reason-input" id="r-${id}" placeholder="Reason">
                            <button class="kick-btn" onclick="kick('${id}')">KICK</button>
                        </div>
                    `;
                    container.appendChild(card);
                }
                
                // 仅更新心跳时间文字，不会影响输入框
                const pulseElem = document.getElementById(`pulse-${id}`);
                if (pulseElem) pulseElem.innerText = `Pulse: ${p.lastHeartbeat}`;
            }
        }

        function kick(id){
            const r = document.getElementById('r-'+id).value || "Violation";
            db.ref('players/'+id).update({ action: 'kick', reason: r });
        }
    </script>
</body>
</html>
